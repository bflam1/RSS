name: Generate & Deploy Mend Release Notes

on:
  schedule:
    # Run every Monday at 08:30 AM US Central (13:30 UTC)
    - cron: '30 13 * * 1'
    # Run every Tuesday at 08:30 AM US Central (13:30 UTC)
    - cron: '30 13 * * 2'
  workflow_dispatch:

# Prevent overlapping runs — cancel any in-progress run for the same trigger
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RSS/HTML generator
        run: |
          python RSSFEED.py

      - name: Prepare Docs folder
        run: |
          mkdir -p docs
          mv mend_combined_release_feed.html docs/index.html
          mv mend_combined_release_feed.xml docs/rss.xml
          mv mend_combined_release_feed.atom docs/atom.xml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e  # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs

      - name: Notify on failure
        if: failure()
        run: |
          gh issue create \
            --title "Feed generation failed: $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "The scheduled feed generation workflow failed. [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
