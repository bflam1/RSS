name: Generate & Deploy Mend Release Notes

on:
  schedule:
    # Run every Monday at 08:30 AM US Central (13:30 UTC)
    - cron: '30 13 * * 1'
    # Run every Tuesday at 08:30 AM US Central (13:30 UTC)
    - cron: '30 13 * * 2'
  workflow_dispatch:

# Prevent overlapping runs — cancel any in-progress run for the same trigger
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RSS/HTML generator
        run: |
          python RSSFEED.py

      - name: Prepare Docs folder
        run: |
          mkdir -p docs
          mv mend_combined_release_feed.html docs/index.html
          mv mend_combined_release_feed.xml docs/rss.xml
          mv mend_combined_release_feed.atom docs/atom.xml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847  # v3.9.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs

      - name: Notify on failure
        if: failure()
        run: |
          gh issue create \
            --title "Feed generation failed: $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "The scheduled feed generation workflow failed. [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
